name: Deploy static app to GitHub Pages
on:
  push:
    branches: [ main ]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "database/**"
      - ".gitignore"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: github-pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Generate Supabase config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > assets/config.js <<EOF
          window.APP_CONFIG = {
            SUPABASE_URL: "${SUPABASE_URL}",
            SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
          };
          EOF
      - name: Prepare publish folder
        run: |
          mkdir -p publish
          rsync -av --exclude ".git" --exclude ".github" --exclude "database" --exclude "docs" --exclude "README.md" --exclude ".gitignore" ./ publish/
      - name: Verify publish folder
        run: |
          find publish -maxdepth 3 -type f | sort
          test -f publish/index.html
          test -f publish/assets/styles.css
          test -f publish/assets/app.js
          test -f publish/assets/config.js
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: publish
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
